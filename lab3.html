<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Basics</title>
    <link rel="stylesheet" href="lab3-styles.css">

    <style>
        h1 {
            font-style: italic;
            text-decoration: underline;
            /* The blue color is set inline, so it stays blue! */
        }

        /* 3. Styling the new div */
        .box-element {
            border: 5px solid #333;
            padding: 20px;
            margin: 30px;
            color: red;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1 style="color: blue;">Styled Heading</h1>

    <p>This paragraph uses external CSS.</p>

    <div class="box-element">
        I am a div with a border, padding, and margin!
    </div>
</body>
</html>
