<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced HTML</title>
</head>
<body>
    <header>
        <h1>Student Profile</h1>
    </header>
    <section>
        <img src="IMG-20251001-WA0017.jpg" alt="Profile Picture">
        <table border="1">
            <tr>
                <th>Name</th>
                <th>Age</th>
                <th>Major</th>
            </tr>
            <tr>
                <td>John Doe</td>
                <td>21</td>
                <td>Computer Science</td>
            </tr>
            <tr>
              <td>Ben</td>
              <td>32</td>
              <td>mechanical</td>
            </tr>
            <tr>
              <td>Peter</td>
              <td>64</td>
              <td>computer engineering</td>
            </tr>
        </table>
    </section>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name"><br>
        <input type="submit" value="Submit">
    </form>

    <form>

      <!-- radio button -->
      <label for="gender">Gender:</label>
      <br>
      Male:   <input type="radio" id="male" name="male"><br>
      Female: <input type="radio" id="female" name="male"><br>

      <!-- checkbox  -->
      <label for="newspaper">subscribe:</label>
      <br>
      <input type="checkbox" name="newspaper"><br>
    </form>
</body>
</html>
